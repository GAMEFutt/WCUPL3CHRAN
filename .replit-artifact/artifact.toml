kind = "web"
previewPath = "/"
title = "Football Match Predictor"
version = "1.0.0"
id = "artifacts/football-predictor"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23307

[services.development]
run = "pnpm --filter @workspace/football-predictor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/football-predictor", "run", "build" ]
serve = "static"
publicDir = "artifacts/football-predictor/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23307"
BASE_PATH = "/"
